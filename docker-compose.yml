version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: subtitle-redis
    ports:
      - "6379:6379"
    volumes:
      - ./redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

  app:
    image: ghcr.io/zyd16888/subtitlegeneration:master
    container_name: subtitle-app
    ports:
      - "8000:8000"
    volumes:
      - ./subtitle-data:/data
      - ./subtitle_service:/tmp/subtitle_service
      # 字幕回写需挂载 Emby 媒体目录，例如:
      # - /your/emby/media:/mnt/media
    environment:
      - DATABASE_URL=sqlite:////app/data/subtitle_service.db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      # 认证配置（生产环境请修改）
      - AUTH_ENABLED=true
      - AUTH_USERNAME=admin
      - AUTH_PASSWORD=your_secure_password
      - JWT_SECRET_KEY=change-this-to-a-random-secret-key
    depends_on:
      - redis
    restart: unless-stopped



